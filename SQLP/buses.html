<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Buses - Bus Ticket Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <i class="fas fa-bus"></i>
                <h1>BusConnect</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>Manage Buses</h2>
                <p>Add, edit, and delete bus information</p>
            </div>
        </section>

        <section class="data-management">
            <div class="container">
                <div class="actions-bar">
                    <h2>Bus Management</h2>
                    <button id="toggleBtn" class="btn" onclick="toggleView('busForm', 'busTable')">View Records</button>
                </div>

                <div class="form-container" id="busForm">
                    <h3 class="form-title">Add New Bus</h3>
                    <form id="addBusForm">
                        <div class="form-group">
                            <label for="busNumber">Bus Number</label>
                            <input type="text" id="busNumber" name="busNumber" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="busType">Bus Type</label>
                            <select id="busType" name="busType" class="form-control" required>
                                <option value="">Select Bus Type</option>
                                <option value="AC">AC</option>
                                <option value="Non-AC">Non-AC</option>
                                <option value="Sleeper">Sleeper</option>
                                <option value="AC Sleeper">AC Sleeper</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="totalSeats">Total Seats</label>
                            <input type="number" id="totalSeats" name="totalSeats" class="form-control" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="operatorName">Operator Name</label>
                            <input type="text" id="operatorName" name="operatorName" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-block">Add Bus</button>
                    </form>
                </div>

                <div class="table-container" id="busTable" style="display: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Bus Number</th>
                                <th>Bus Type</th>
                                <th>Total Seats</th>
                                <th>Operator Name</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Buses will be populated here by script.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 BusConnect Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
