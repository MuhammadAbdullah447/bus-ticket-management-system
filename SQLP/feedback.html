<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Feedback - Bus Ticket Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        .rating input {
            display: none;
        }
        .rating label {
            cursor: pointer;
            font-size: 1.5rem;
            color: #ddd;
            padding: 0 0.1em;
        }
        .rating input:checked ~ label {
            color: #ffb400;
        }
        .rating label:hover,
        .rating label:hover ~ label {
            color: #ffb400;
        }
        .star-rating {
            color: #ffb400;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <i class="fas fa-bus"></i>
                <h1>BusConnect</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>Manage Feedback</h2>
                <p>Add, edit, and view customer feedback</p>
            </div>
        </section>

        <section class="data-management">
            <div class="container">
                <div class="actions-bar">
                    <h2>Feedback Management</h2>
                    <button id="toggleBtn" class="btn" onclick="toggleView('feedbackForm', 'feedbackTable')">View Records</button>
                </div>

                <div class="form-container" id="feedbackForm">
                    <h3 class="form-title">Add New Feedback</h3>
                    <form id="addFeedbackForm">
                        <div class="form-group">
                            <label for="userId">User</label>
                            <select id="userId" name="userId" class="form-control" required>
                                <option value="">Select User</option>
                                <!-- Options will be populated by JavaScript -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="ticketId">Ticket</label>
                            <select id="ticketId" name="ticketId" class="form-control" required>
                                <option value="">Select Ticket</option>
                                <!-- Options will be populated by JavaScript -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Rating</label>
                            <div class="rating">
                                <input type="radio" id="star5" name="rating" value="5" required />
                                <label for="star5"><i class="fas fa-star"></i></label>
                                <input type="radio" id="star4" name="rating" value="4" />
                                <label for="star4"><i class="fas fa-star"></i></label>
                                <input type="radio" id="star3" name="rating" value="3" />
                                <label for="star3"><i class="fas fa-star"></i></label>
                                <input type="radio" id="star2" name="rating" value="2" />
                                <label for="star2"><i class="fas fa-star"></i></label>
                                <input type="radio" id="star1" name="rating" value="1" />
                                <label for="star1"><i class="fas fa-star"></i></label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="comment">Comment</label>
                            <textarea id="comment" name="comment" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="feedbackDate">Feedback Date</label>
                            <input type="date" id="feedbackDate" name="feedbackDate" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-block">Add Feedback</button>
                    </form>
                </div>

                <div class="table-container" id="feedbackTable" style="display: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Ticket</th>
                                <th>Route</th>
                                <th>Bus</th>
                                <th>Rating</th>
                                <th>Comment</th>
                                <th>Feedback Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="feedbackTableBody">
                            <!-- Data will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 BusConnect Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
